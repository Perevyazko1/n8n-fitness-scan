<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px 24px; background: var(--surface-page); color: var(--text-primary); font-family: var(--font-base); }
  .grp { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-hint); margin: 0 0 10px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 74px; padding: 12px 6px;
        background: var(--surface-card); border-radius: var(--radius-sm); box-shadow: var(--shadow-card); }
  .cap { font-size: 10px; color: var(--text-hint); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Icon } = window.RyzhFitnessDesignSystem_eec584;
    const NAV = ['home','meal','dumbbell','scan'];
    const MEAN = ['flame','snowflake','check','lock','leaf','trophy'];
    const CTRL = ['settings','chevronLeft','chevronRight','plus','repeat','edit','close'];
    const Cell = ({n}) => (
      <div className="ic"><Icon name={n} size={24} /><span className="cap">{n}</span></div>
    );
    function Demo() {
      return (
        <>
          <div className="grp">Навигация</div>
          <div className="row">{NAV.map(n => <Cell key={n} n={n} />)}</div>
          <div className="grp">Смысл / статус</div>
          <div className="row">{MEAN.map(n => <Cell key={n} n={n} />)}</div>
          <div className="grp">Управление</div>
          <div className="row">{CTRL.map(n => <Cell key={n} n={n} />)}</div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
