<!-- @dsCard group="Brand" viewport="700x560" name="Маскот — сетка 4×4" subtitle="Мышцы (строки) × живот (столбцы). Все 16 состояний Рыжа" -->
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px 24px; background:var(--surface-page); font-family:var(--font-base); color:var(--text-primary); }
  .sub { font-size:12px; color:var(--text-hint); margin:0 0 16px; max-width:560px; line-height:1.5; }
  table { border-collapse:separate; border-spacing:8px; }
  th { font-size:11px; color:var(--text-hint); font-weight:600; }
  .cell { width:104px; height:104px; border-radius:14px; overflow:hidden;
    background:radial-gradient(circle at 50% 34%, var(--medallion-1), var(--medallion-2) 72%); box-shadow:var(--shadow-card); }
  .cell img { width:100%; height:100%; object-fit:cover; }
  .rowlbl { font-size:11px; color:var(--text-secondary); font-weight:700; writing-mode:vertical-rl; transform:rotate(180deg); white-space:nowrap; }
  .corner { box-shadow:0 0 0 2.5px var(--accent), var(--shadow-card); }
</style>
</head>
<body>
  <p class="sub">Тело Рыжа меняется по двум осям. <b>Вниз</b> — мышцы (m0 худой → m3 качок). <b>Вправо</b> — живот (b0 плоский → b3 пузо). Углы (обведены) = крайние типажи: спортивный, толстый, и «подкачался, но вес есть».</p>
  <table>
    <tr><th></th><th>b0 плоский</th><th>b1</th><th>b2</th><th>b3 пузо</th></tr>
    <tr><th class="rowlbl">m0 худой</th>
      <td><div class="cell corner"><img src="../assets/mascot/fox_m0_b0.png"></div></td>
      <td><div class="cell"><img src="../assets/mascot/fox_m0_b1.png"></div></td>
      <td><div class="cell"><img src="../assets/mascot/fox_m0_b2.png"></div></td>
      <td><div class="cell corner"><img src="../assets/mascot/fox_m0_b3.png"></div></td>
    </tr>
    <tr><th class="rowlbl">m1</th>
      <td><div class="cell"><img src="../assets/mascot/fox_m1_b0.png"></div></td>
      <td><div class="cell"><img src="../assets/mascot/fox_m1_b1.png"></div></td>
      <td><div class="cell"><img src="../assets/mascot/fox_m1_b2.png"></div></td>
      <td><div class="cell"><img src="../assets/mascot/fox_m1_b3.png"></div></td>
    </tr>
    <tr><th class="rowlbl">m2</th>
      <td><div class="cell"><img src="../assets/mascot/fox_m2_b0.png"></div></td>
      <td><div class="cell"><img src="../assets/mascot/fox_m2_b1.png"></div></td>
      <td><div class="cell"><img src="../assets/mascot/fox_m2_b2.png"></div></td>
      <td><div class="cell"><img src="../assets/mascot/fox_m2_b3.png"></div></td>
    </tr>
    <tr><th class="rowlbl">m3 качок</th>
      <td><div class="cell corner"><img src="../assets/mascot/fox_m3_b0.png"></div></td>
      <td><div class="cell"><img src="../assets/mascot/fox_m3_b1.png"></div></td>
      <td><div class="cell"><img src="../assets/mascot/fox_m3_b2.png"></div></td>
      <td><div class="cell corner"><img src="../assets/mascot/fox_m3_b3.png"></div></td>
    </tr>
  </table>
</body>
</html>
