<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px; background: var(--surface-page); font-family: var(--font-base); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 104px; }
  .chip { height: 64px; border-radius: var(--radius-sm); box-shadow: var(--shadow-card); }
  .nm { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-top: 7px; }
  .hex { font-size: 11px; color: var(--text-hint); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--orange-600)"></div><div class="nm">Акцент</div><div class="hex">#E85D1C</div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-700)"></div><div class="nm">Нажатие</div><div class="hex">#C24A12</div></div>
    <div class="sw"><div class="chip" style="background:var(--amber-500)"></div><div class="nm">Стрик</div><div class="hex">#F0972A</div></div>
    <div class="sw"><div class="chip" style="background:var(--green-600)"></div><div class="nm">Успех</div><div class="hex">#2FA866</div></div>
    <div class="sw"><div class="chip" style="background:var(--red-600)"></div><div class="nm">Опасность</div><div class="hex">#D8442A</div></div>
  </div>
</body>
</html>
