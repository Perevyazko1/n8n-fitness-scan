<!-- @dsCard group="Colors" viewport="700x210" name="Тёплая нейтральная шкала" subtitle="Кремовый фон, белые карточки, песочные границы — одна тема" -->
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px; background: var(--surface-page); font-family: var(--font-base); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { width: 96px; }
  .chip { height: 58px; border-radius: var(--radius-sm); border: 1px solid var(--border-hairline); }
  .nm { font-size: 11px; font-weight: 600; color: var(--text-primary); margin-top: 6px; }
  .hex { font-size: 10px; color: var(--text-hint); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--cream-page)"></div><div class="nm">Фон</div><div class="hex">#FBF4EA</div></div>
    <div class="sw"><div class="chip" style="background:var(--white)"></div><div class="nm">Карточка</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-100)"></div><div class="nm">Chip</div><div class="hex">#F2E9DB</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-200)"></div><div class="nm">Граница</div><div class="hex">#EFE6D8</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-300)"></div><div class="nm">Трек</div><div class="hex">#E2D6C4</div></div>
    <div class="sw"><div class="chip" style="background:var(--warm-500)"></div><div class="nm">Подсказка</div><div class="hex">#9C9082</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="nm">Текст</div><div class="hex">#2A2620</div></div>
  </div>
</body>
</html>
