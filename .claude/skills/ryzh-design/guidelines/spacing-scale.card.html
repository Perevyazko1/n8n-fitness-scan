<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 24px; background: var(--surface-page); display: flex; gap: 18px; align-items: flex-end; }
  .item { text-align: center; }
  .bar { background: var(--accent); height: 22px; border-radius: 3px; }
  .nm { font-size: 10px; color: var(--text-hint); margin-top: 7px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="item"><div class="bar" style="width:4px"></div><div class="nm">4</div></div>
  <div class="item"><div class="bar" style="width:8px"></div><div class="nm">8</div></div>
  <div class="item"><div class="bar" style="width:10px"></div><div class="nm">10</div></div>
  <div class="item"><div class="bar" style="width:12px"></div><div class="nm">12</div></div>
  <div class="item"><div class="bar" style="width:14px"></div><div class="nm">14★</div></div>
  <div class="item"><div class="bar" style="width:16px"></div><div class="nm">16★</div></div>
  <div class="item"><div class="bar" style="width:20px"></div><div class="nm">20</div></div>
  <div class="item"><div class="bar" style="width:24px"></div><div class="nm">24</div></div>
  <div class="item"><div class="bar" style="width:28px"></div><div class="nm">28</div></div>
</body>
</html>
