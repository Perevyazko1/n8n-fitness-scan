<!-- @dsCard group="Type" viewport="700x170" name="Numerals & weights" subtitle="Tabular numerals for stats; weight ramp 400 → 800" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px 24px; background: var(--surface-page); color: var(--text-primary); display: flex; gap: 40px; flex-wrap: wrap; }
  .blk { display: flex; flex-direction: column; gap: 8px; }
  .lbl { font-size: 11px; color: var(--text-hint); }
  .w { display: flex; align-items: baseline; gap: 12px; }
  .wn { font-size: 11px; color: var(--text-hint); width: 78px; }
</style>
</head>
<body>
  <div class="blk">
    <span class="lbl">TABULAR NUMERALS · stats align</span>
    <span style="font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1">137<br>1 687</span>
  </div>
  <div class="blk">
    <span class="lbl">WEIGHTS</span>
    <div class="w"><span class="wn">400 Regular</span><span style="font-weight:400;font-size:18px">Творог 5%</span></div>
    <div class="w"><span class="wn">600 Semibold</span><span style="font-weight:600;font-size:18px">Творог 5%</span></div>
    <div class="w"><span class="wn">700 Bold</span><span style="font-weight:700;font-size:18px">Творог 5%</span></div>
    <div class="w"><span class="wn">800 Heavy</span><span style="font-weight:800;font-size:18px">Творог 5%</span></div>
  </div>
</body>
</html>
