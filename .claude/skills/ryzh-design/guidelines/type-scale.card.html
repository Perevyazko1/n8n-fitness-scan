<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="System font stack — page titles, stats, body, captions" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px 24px; background: var(--surface-page); color: var(--text-primary); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; }
  .spec { font-size: 11px; color: var(--text-hint); width: 118px; flex: 0 0 118px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="line"><span class="spec">H1 · 22 / 700</span><span style="font-size:var(--fs-h1);font-weight:var(--fw-bold)">Сегодня</span></div>
  <div class="line"><span class="spec">Stat · 22 / 700</span><span style="font-size:var(--fs-stat);font-weight:var(--fw-bold);font-variant-numeric:tabular-nums">1444 ккал</span></div>
  <div class="line"><span class="spec">H2 · 20 / 600</span><span style="font-size:var(--fs-h2);font-weight:var(--fw-semibold)">Штрихкод цифрами</span></div>
  <div class="line"><span class="spec">Stat title · 17 / 600</span><span style="font-size:var(--fs-stat-title);font-weight:var(--fw-semibold)">Сегодня тренировка</span></div>
  <div class="line"><span class="spec">Body · 16 / 400</span><span style="font-size:var(--fs-body)">Наведи камеру на штрихкод</span></div>
  <div class="line"><span class="spec">Sub · 14 / 400</span><span style="font-size:var(--fs-sub)">Белок · Жиры · Углеводы</span></div>
  <div class="line"><span class="spec">Small · 13 / 400</span><span style="font-size:var(--fs-small);color:var(--text-hint)">08:30 · Б17 · Ж5 · У3</span></div>
</body>
</html>
