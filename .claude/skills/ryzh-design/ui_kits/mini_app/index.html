<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ryzh Fitness — Mini App</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; }
  body {
    margin: 0; display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
    background: #e9eaee;
  }
  @keyframes ryzh-spin { to { transform: rotate(360deg); } }
  @keyframes ryzh-scan { 0%, 100% { top: 8%; } 50% { top: 86%; } }
  /* hide scrollbars inside the device for a clean mock */
  .mini-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .mini-scroll { scrollbar-width: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="FoodLog.jsx"></script>
<script type="text/babel" src="Workout.jsx"></script>
<script type="text/babel" src="Scanner.jsx"></script>
<script type="text/babel" src="Settings.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const NS = window.RyzhFitnessDesignSystem_eec584;
    const { TabBar, Icon } = NS;

    const TABS = [
      { id: 'dashboard', icon: <Icon name="home" size={22} />,     label: 'Главная' },
      { id: 'foodlog',  icon: <Icon name="meal" size={22} />,     label: 'Еда' },
      { id: 'workout',  icon: <Icon name="dumbbell" size={22} />, label: 'Трен' },
      { id: 'scanner',  icon: <Icon name="scan" size={22} />,     label: 'Сканер' },
    ];

    function MiniApp() {
      const [tab, setTab] = React.useState('dashboard');
      const [settingsOpen, setSettingsOpen] = React.useState(false);
      const dark = tab === 'scanner';

      const Screen = { dashboard: Dashboard, foodlog: FoodLog, workout: Workout, scanner: Scanner }[tab];
      const fullBleed = tab === 'scanner';

      return (
        <IOSDevice dark={dark}>
          <div style={{ position: 'relative', height: '100%', display: 'flex', flexDirection: 'column' }}>
            <div
              className="mini-scroll"
              style={{
                flex: 1, overflowY: 'auto',
                background: 'var(--surface-page)',
                paddingTop: fullBleed ? 0 : 50,   /* clear the status bar */
              }}
            >
              <Screen onOpenSettings={() => setSettingsOpen(true)} />
            </div>
            {/* bottom tab bar — sits above the home indicator */}
            <div style={{ paddingBottom: 22, background: 'var(--surface-page)' }}>
              <TabBar tabs={TABS} active={tab} onChange={setTab} fixed={false} />
            </div>

            {/* Settings overlay */}
            {settingsOpen && (
              <div className="mini-scroll" style={{ position: 'absolute', inset: 0, zIndex: 80, overflowY: 'auto', background: 'var(--surface-page)' }}>
                <Settings onClose={() => setSettingsOpen(false)} />
              </div>
            )}
          </div>
        </IOSDevice>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MiniApp />);
  </script>
</body>
</html>
