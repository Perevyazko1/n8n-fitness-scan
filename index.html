<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Fitness</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/zxing-browser.min.js"></script>
<link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>

<!-- ===== Главная (дашборд) ===== -->
<div id="dashboard" class="screen tab-screen">
  <div class="page">
    <div class="page-head">
      <div><h1>Сегодня</h1><span id="dash-date" class="muted small"></span></div>
      <button id="dash-refresh" class="icon-btn" aria-label="Обновить">⟳</button>
    </div>
    <div id="dash-loading" class="loading">Загрузка…</div>
    <div id="dash-error" class="error-box hidden"></div>
    <div id="dash-content" class="hidden">

      <div class="card stat" id="card-workout">
        <div class="stat-row"><span class="stat-ico" id="wk-ico">🏋️</span>
          <div><div class="stat-title" id="wk-title">—</div>
               <div class="muted small" id="wk-sub"></div></div>
        </div>
      </div>

      <div class="card stat" id="card-kcal">
        <div class="stat-head"><span class="stat-label">Калории</span>
          <span id="kcal-left" class="stat-big">—</span></div>
        <div class="bar"><div id="kcal-bar" class="bar-fill"></div></div>
        <div class="muted small" id="kcal-sub"></div>
      </div>

      <div class="card stat" id="card-macros">
        <div class="macro" id="m-protein"><span class="macro-name">Белок</span>
          <div class="bar sm"><div class="bar-fill" id="bar-protein"></div></div>
          <span class="macro-val" id="val-protein"></span></div>
        <div class="macro" id="m-fat"><span class="macro-name">Жиры</span>
          <div class="bar sm"><div class="bar-fill" id="bar-fat"></div></div>
          <span class="macro-val" id="val-fat"></span></div>
        <div class="macro" id="m-carbs"><span class="macro-name">Углеводы</span>
          <div class="bar sm"><div class="bar-fill" id="bar-carbs"></div></div>
          <span class="macro-val" id="val-carbs"></span></div>
      </div>

    </div>
  </div>
</div>

<!-- ===== Еда за день (Фаза 2 — заглушка) ===== -->
<div id="foodlog" class="screen tab-screen">
  <div class="page">
    <div class="page-head"><h1>Еда за день</h1></div>
    <div class="soon">Скоро: список съеденного за сегодня с суммой за день.</div>
  </div>
</div>

<!-- ===== Тренировка (Фаза 3) ===== -->
<div id="workout" class="screen tab-screen">
  <div class="page">
    <div class="page-head">
      <div><h1>Тренировка</h1><span id="wkt-sub" class="muted small"></span></div>
      <button id="wkt-refresh" class="icon-btn" aria-label="Обновить">⟳</button>
    </div>
    <div id="wkt-loading" class="loading">Загрузка…</div>
    <div id="wkt-error" class="error-box hidden"></div>
    <div id="wkt-rest" class="soon hidden"></div>
    <div id="wkt-list" class="hidden"></div>
  </div>
</div>

<!-- ===== Сканер (поток: камера → карточка / не найдено / вручную) ===== -->
<div id="scanner" class="screen">
  <video id="video" playsinline muted autoplay></video>
  <div class="overlay">
    <div class="frame"></div>
    <p class="hint">Наведи камеру на штрихкод</p>
  </div>
  <button id="btn-manual" class="manual-btn">Ввести цифры вручную</button>
</div>

<div id="manual" class="screen">
  <div class="card">
    <h2>Штрихкод цифрами</h2>
    <input id="manual-code" type="tel" inputmode="numeric" pattern="\d*" placeholder="например 3017620422003" />
    <button id="btn-manual-go" class="primary">Найти</button>
    <button id="btn-manual-back" class="ghost">Назад к камере</button>
  </div>
</div>

<div id="card" class="screen">
  <div class="card">
    <h2 id="prod-name">—</h2>
    <p id="prod-brand" class="muted"></p>
    <p id="prod-kcal" class="big"></p>
    <p id="prod-macros" class="macros"></p>
    <p id="prod-barcode" class="muted small"></p>

    <div class="grams-row">
      <label>Грамм:</label>
      <input id="grams" type="number" min="1" step="1" value="100" />
    </div>
    <p id="computed" class="computed"></p>

    <button id="btn-eat" class="primary">Съел</button>
    <button id="btn-save" class="secondary">В продукты</button>
    <button id="btn-rescan" class="ghost">Сканировать ещё</button>
  </div>
</div>

<div id="notfound" class="screen">
  <div class="card">
    <h2>Не нашли в базе</h2>
    <p class="muted">Штрихкод: <span id="nf-barcode"></span></p>
    <p>Описание</p>
    <input id="nf-name" placeholder="Название (например: Творог Дмитровский 9%)" />
    <div class="grid">
      <div><label>ккал/100г</label><input id="nf-kcal" type="number" min="0" step="1" /></div>
      <div><label>белок</label><input id="nf-protein" type="number" min="0" step="0.1" /></div>
      <div><label>жир</label><input id="nf-fat" type="number" min="0" step="0.1" /></div>
      <div><label>углеводы</label><input id="nf-carbs" type="number" min="0" step="0.1" /></div>
    </div>
    <div class="grams-row">
      <label>Стандартная порция, г:</label>
      <input id="nf-serving" type="number" min="1" step="1" />
    </div>
    <button id="btn-save-manual" class="primary">Сохранить в продукты</button>
    <button id="btn-rescan2" class="ghost">Назад к сканеру</button>
  </div>
</div>

<div id="status" class="status hidden"></div>

<!-- ===== Нижний таб-бар ===== -->
<nav id="tabbar" class="tabbar">
  <button class="tab" data-tab="dashboard"><span class="tab-ico">🏠</span>Главная</button>
  <button class="tab" data-tab="foodlog"><span class="tab-ico">🍽️</span>Еда</button>
  <button class="tab" data-tab="workout"><span class="tab-ico">🏋️</span>Трен</button>
  <button class="tab" data-tab="scanner"><span class="tab-ico">📷</span>Сканер</button>
</nav>

<script src="main.js?v=5"></script>
</body>
</html>
